name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping pending runs queued between
# the run in-progress and latest queued. However, do NOT cancel in-progress
# runs as we want production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install, build, and upload site
        uses: withastro/action@v3
        env:
          # GitHub Pages serves the repo at https://<user>.github.io/<repo>/.
          # `base` must match that subpath; `site` is the absolute origin.
          ASTRO_BASE: /bsgroup
          ASTRO_SITE: https://onorefalcone.github.io

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
